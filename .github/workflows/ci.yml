---
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Plan unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run BoltSpec plan tests
        run: bundle exec rspec spec/plans/

  acceptance:
    name: Acceptance (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu2204
            image: ubuntu:22.04
          # rocky9: add when a working EL9 image is confirmed

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Start test container (${{ matrix.platform }})
        run: |
          docker pull ${{ matrix.image }}
          docker run -d --name ovadm-acceptance ${{ matrix.image }} sleep infinity

      - name: Bootstrap container
        run: |
          docker exec ovadm-acceptance bash -c \
            "apt-get update -qq && apt-get install -y -qq curl ca-certificates"

      - name: Run acceptance tests
        run: bundle exec rspec spec/acceptance/

      - name: Remove container
        if: always()
        run: docker rm -f ovadm-acceptance || true
