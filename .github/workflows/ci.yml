---
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npx --yes markdownlint-cli '**/*.md' --ignore node_modules

  unit:
    name: Plan unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run BoltSpec plan tests
        run: bundle exec rspec spec/plans/

  acceptance:
    name: Acceptance (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu2204
            image: ubuntu:22.04
            bootstrap: "apt-get update -qq && apt-get install -y -qq curl ca-certificates"
          - platform: ubuntu2404
            image: ubuntu:24.04
            bootstrap: "apt-get update -qq && apt-get install -y -qq curl ca-certificates"
          - platform: debian12
            image: debian:12
            bootstrap: "apt-get update -qq && apt-get install -y -qq curl ca-certificates"
          - platform: rocky9
            image: rockylinux:9
            bootstrap: "dnf install -y -q ca-certificates"

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Start test container (${{ matrix.platform }})
        run: |
          docker pull ${{ matrix.image }}
          docker run -d --name ovadm-acceptance ${{ matrix.image }} sleep infinity

      - name: Bootstrap container
        run: |
          docker exec ovadm-acceptance bash -c "${{ matrix.bootstrap }}"

      - name: Run acceptance tests
        run: bundle exec rspec spec/acceptance/

      - name: Remove container
        if: always()
        run: docker rm -f ovadm-acceptance || true
